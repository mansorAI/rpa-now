version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: automation_db
    environment:
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation_pass
      POSTGRES_DB: arabic_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: automation_backend
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://automation:automation_pass@postgres:5432/arabic_automation
      NODE_ENV: production
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: automation_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
